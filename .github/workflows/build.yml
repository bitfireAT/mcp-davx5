name: Gradle build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: temurin
    
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Run Gradle build
      run: ./gradlew :server:build